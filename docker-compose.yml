services:
  mysql:
    image: mysql:8
    container_name: adotapet_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-adotapet}

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: adotapet_backend
    restart: always

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      PORT: 3000
      DATABASE_URL: "mysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/${MYSQL_DATABASE:-adotapet}"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required - copy .env.example to .env}

    ports:
      - "3000:3000"

    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: adotapet_frontend
    restart: always

    depends_on:
      - backend

    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}

    ports:
      - "3001:3000"

  # 4o container - MailHog: SMTP fake + Web UI.
  # Atende: requisito NP2 S07 de "4+ containers", "comunicacao entre containers"
  # (backend/Jenkins enviam e-mail para mailhog:1025) e "container do Docker Hub".
  # Web UI em http://localhost:8025 mostra todas as mensagens capturadas.
  mailhog:
    image: mailhog/mailhog:latest
    container_name: adotapet_mailhog
    restart: always
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI (inbox)
    volumes:
      - mailhog_data:/maildir
    environment:
      MH_STORAGE: maildir
      MH_MAILDIR_PATH: /maildir

volumes:
  mysql_data:
  backend_uploads:
  mailhog_data:
