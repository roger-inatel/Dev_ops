name: pipeline_back_e2e

on:
  push:
    branches:
      - main
      - pipeline-update
    paths:
      - 'backend/**'
      - '.github/workflows/pipeline_e2e_backend.yaml'

  pull_request:
    branches:
      - main
      - pipeline-update
    paths:
      - 'backend/**'
      - '.github/workflows/pipeline_e2e_backend.yaml'

jobs:
  setup:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm ci

      - run: npx prisma generate
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/test"

  e2e:
    runs-on: ubuntu-latest
    needs: setup

    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm ci

      - run: npx prisma generate
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/test"

      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/test"

      - run: npm run test:e2e
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/test"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          if-no-files-found: ignore
          path: backend

  report:
    runs-on: ubuntu-latest
    needs: e2e

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: e2e-report
        continue-on-error: true

      - run: ls -la