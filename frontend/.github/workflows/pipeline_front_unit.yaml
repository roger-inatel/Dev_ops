name: pipeline_front_unit

on:
  push:
    branches:
      - main
      - pipeline-update
  pull_request:
    branches:
      - main
      - pipeline-update

env:
  NODE_VERSION: '22'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache dependências
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Instalar dependências
        run: npm ci

      - name: Build do front
        run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes (Jest + coverage)
        run: npm run test -- --coverage

      # 🔥 salva coverage como artifact
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

  report:
    runs-on: ubuntu-latest
    needs: test

    steps:
      # 📥 baixa o coverage do job anterior
      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      # 📊 Mostra resumo no log (simples e útil)
      - name: Exibir resumo de cobertura
        run: |
          echo "📊 Arquivos gerados:"
          ls -la

      # (opcional) você pode fazer upload de novo organizado
      - name: Re-upload organizado
        uses: actions/upload-artifact@v4
        with:
          name: final-report
          path: .
