name: pipeline_front_e2e

on:
  push:
    branches:
      - main
      - pipeline-update
  pull_request:
    branches:
      - main
      - pipeline-update

env:
  NODE_VERSION: '22'

jobs:
  # 🧱 JOB 1 - BUILD
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Clona o repositório
      - name: Clonar repositório
        uses: actions/checkout@v4

      # 🟢 Configura Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 📦 Instala dependências
      - name: Instalar dependências
        run: npm ci

      # 🧱 Build do Next.js
      - name: Build
        run: npm run build


  # 🧪 JOB 2 - TESTES E2E (CYPRESS)
  test:
    runs-on: ubuntu-latest
    needs: build  # só roda se o build passar

    steps:
      # 📥 Clona o repositório
      - name: Clonar repositório
        uses: actions/checkout@v4

      # 🟢 Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 📦 Instala dependências
      - name: Instalar dependências
        run: npm ci

      # 🔥 IMPORTANTE: build novamente (cada job é isolado)
      - name: Build
        run: npm run build

      # 🚀 Sobe aplicação em background
      - name: Start app
        run: npm start &

      # ⏳ Espera a aplicação subir (com timeout)
      - name: Esperar app
        run: npx wait-on http://localhost:3000 --timeout 60000

      # 🧪 Executa testes Cypress
      - name: Cypress run
        run: npx cypress run

      # 📦 Salva vídeos e screenshots (debug profissional)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results
          path: |
            cypress/videos
            cypress/screenshots


  # 📊 JOB 3 - RELATÓRIO
  report:
    runs-on: ubuntu-latest
    needs: test

    steps:
      # 📥 Baixa os resultados
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: cypress-results

      # 📊 Lista arquivos (debug / conferência)
      - name: Listar arquivos
        run: ls -R
